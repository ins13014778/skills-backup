# 关键词: tier override - 用于覆盖默认推断 (如果 SKILL 名字不符合规则)
# 规则:
#   - hack -> master
#   - 名字以 -sec 结尾, 或在白名单中 -> category
#   - 其他 -> deep
tier_overrides:
  hack: master
  recon-for-sec: category
  api-sec: category
  auth-sec: category
  injection-checking: category
  file-access-vuln: category
  business-logic-vuln: category
